<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Calculator</h1>
    <div class="calculator">
      <div class="screen">
        <div class="screen-history"></div>
        <div class="screen-current"></div>
      </div>
      <div class="buttons">
        <button class="btn-correction">AC</button>
        <button class="btn-correction">DEL</button>
        <button class="btn-operator btn-percent">%</button>
        <button class="btn-operator">÷</button>

        <button class="btn-number">7</button>
        <button class="btn-number">8</button>
        <button class="btn-number">9</button>
        <button class="btn-operator">×</button>

        <button class="btn-number">4</button>
        <button class="btn-number">5</button>
        <button class="btn-number">6</button>
        <button class="btn-operator">-</button>

        <button class="btn-number">1</button>
        <button class="btn-number">2</button>
        <button class="btn-number">3</button>
        <button class="btn-operator">+</button>

        <button class="btn-number btn-zero">0</button>
        <button class="btn-number">.</button>
        <button class="btn-equal">=</button>
      </div>
    </div>
    <script src="javascript.js"></script>
  </body>
</html>
